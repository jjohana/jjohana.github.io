name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build static site
        run: npm run build

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir -p pages/series3
          cp -R dist/. pages/series3/
          current_js="$(find pages/series3/assets -maxdepth 1 \( -name 'index.js' -o -name 'index-*.js' \) -print -quit)"
          if [ -n "$current_js" ]; then
            for legacy_js in index-DVrqSEXF.js index-CtmP__jh.js index-BE8SQUyC.js; do
              cp "$current_js" "pages/series3/assets/$legacy_js"
            done
          fi
          current_css="$(find pages/series3/assets -maxdepth 1 \( -name 'index.css' -o -name 'index-*.css' \) -print -quit)"
          if [ -n "$current_css" ]; then
            for legacy_css in index-Bs5njU83.css; do
              cp "$current_css" "pages/series3/assets/$legacy_css"
            done
          fi
          cat > pages/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
              <meta http-equiv="Pragma" content="no-cache" />
              <meta http-equiv="Expires" content="0" />
              <meta http-equiv="refresh" content="0; url=/series3/" />
              <title>Series 3 QCM Practice</title>
              <script>window.location.replace("/series3/");</script>
            </head>
            <body>
              <p><a href="/series3/">Open Series 3 QCM Practice</a></p>
            </body>
          </html>
          HTML
          touch pages/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
